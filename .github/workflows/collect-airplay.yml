name: Collect radio airplay

# Polls each station's public now-playing endpoint and commits new spins back to
# the repo (git-as-database). NOTE: GitHub only fires `schedule` from the default
# branch, so this cron does not run from a feature branch — use "Run workflow"
# (workflow_dispatch) to test it on a branch.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 min (GitHub's practical floor is ~5)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: airplay-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Poll stations
        working-directory: radio-airplay-monitor/collector
        run: go run . -data ../data

      - name: Commit new spins
        run: |
          git config user.name "airplay-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radio-airplay-monitor/data
          if git diff --cached --quiet; then
            echo "no new spins this run"
            exit 0
          fi
          git commit -m "data: airplay spins $(date -u +%FT%TZ) [skip ci]"
          # tolerate concurrent data commits from a previous run
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
